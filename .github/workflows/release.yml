name: Release

# Fires ONLY when a SemVer tag (e.g. v0.2.0) is pushed. A normal push to main (or any
# branch) does NOT trigger a release. Create tags with `npm version <patch|minor|major>`
# then `git push --follow-tags` - see CONTRIBUTING.md.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm provenance (OIDC), harmless if npm publish is skipped

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    # The `secrets` context is not allowed in step `if:` conditions, so surface the
    # token as a job-level env var and test that instead.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg."
            echo "Bump with 'npm version' so the tag and package.json agree."
            exit 1
          fi
          echo "Releasing v$pkg"

      - name: Run tests
        run: npm test

      - name: Run demo (smoke test)
        run: npm run demo

      - name: Build release notes from CHANGELOG
        run: node scripts/changelog-section.mjs "${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md

      - name: Publish to npm
        # Runs only when an NPM_TOKEN secret is configured; otherwise the release is
        # GitHub-only and this step is skipped rather than failing the job.
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
