name: Release Pipeline

# Two ways to cut a release:
#   1. Automated - GitHub UI: Actions -> "Release Pipeline" -> "Run workflow" -> pick a
#      bump (patch/minor/major). Runs tests, bumps package.json, pushes the commit + tag
#      to main (rebase-safe), publishes to npm, and creates the GitHub Release.
#   2. Manual - locally run `npm version <bump>` then `git push --follow-tags`; the pushed
#      tag triggers this same pipeline.
#
# A normal push to main does NOT release - only a v* tag or a manual dispatch does.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
  push:
    tags:
      - 'v*'

# Never run two releases at once - prevents the main-branch push race.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # push the version commit/tag and create the GitHub Release
  id-token: write   # npm provenance (OIDC)

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can rebase before pushing

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Gate the release on a green build BEFORE bumping/tagging/publishing.
      - name: Run tests
        run: npm test

      - name: Run demo (smoke test)
        run: npm run demo

      # Automated path: bump package.json (no tag yet), commit.
      - name: Bump version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          git commit -am "release: v$version"

      - name: Resolve version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME#v}"
            if [ "$tag" != "$version" ]; then
              echo "::error::Tag v$tag does not match package.json version $version."
              exit 1
            fi
          fi
          echo "Releasing v$version"

      # Automated path: push the commit + tag to main FIRST (rebase-safe so a concurrent
      # main update does not cause a non-fast-forward), BEFORE the irreversible npm
      # publish. If publish then fails, the git record exists and the version can be
      # re-published manually.
      - name: Push commit and tag to main
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Build release notes from CHANGELOG
        run: node scripts/changelog-section.mjs "$VERSION" > RELEASE_NOTES.md

      # Trusted Publishing (OIDC) needs a recent npm; Node 22 ships npm 10.x.
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      # Publish via GitHub OIDC - no token, no 2FA. Requires a Trusted Publisher
      # configured for this package on npmjs.com (repo vishnu-77/pigeon, workflow
      # release.yml). Best-effort so a publish gap never sinks the git/GitHub release.
      - name: Publish to npm (Trusted Publishing / OIDC)
        id: npm_publish
        continue-on-error: true
        run: npm publish --provenance --access public

      - name: Note npm publish outcome
        run: |
          if [ "${{ steps.npm_publish.outcome }}" = "success" ]; then
            echo "✅ Published to npm." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ npm publish failed (see the step above) - the GitHub release still completed. Fix the npm credential and re-run to publish." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}
